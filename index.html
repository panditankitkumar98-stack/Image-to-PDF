</html><section class="hero">

<h1>

Image to <span>PDF</span>

Converter

</h1>

<p>

Convert multiple images into a professional PDF.

</p>

</section>
<div class="uploadBox">

<input
type="file"
id="imageInput"
multiple
accept="image/*"
hidden>

<label for="imageInput">

Choose Images

</label>

<div class="pdfSettings">

    <h2>PDF Settings</h2>

    <div class="settingGrid">

        <!-- Page Size -->
        <div class="setting">
            <label>Page Size</label>
            <select id="pageSize">
                <option value="A4">A4</option>
                <option value="Letter">Letter</option>
                <option value="Legal">Legal</option>
            </select>
        </div>

        <!-- Image Fit -->
        <div class="setting">
            <label>Image Fit</label>
            <select id="fitMode">
                <option value="fit">Fit Page</option>
                <option value="fill">Fill Page</option>
            </select>
        </div>

        <!-- Orientation -->
        <div class="setting">
            <label>Orientation</label>
            <select id="orientation">
                <option value="portrait">Portrait</option>
                <option value="landscape">Landscape</option>
            </select>
        </div>

        <!-- Margins -->
        <div class="setting">
            <label>Margins (mm)</label>
            <input type="number" id="margin" value="10" min="0" max="30">
        </div>

        <!-- Image Quality -->
        <div class="setting">
            <label>Image Quality</label>
            <input type="range" id="quality" min="0.5" max="1" step="0.05" value="0.95">
        </div>

        <!-- PDF Name -->
        <div class="setting">
            <label>PDF Name</label>
            <input type="text" id="pdfName" placeholder="MyDocument">
        </div>

    </div>

</div>
  

<h2>PDF Settings</h2>

</div>
<h2>

Selected Images

</h2>

<div id="preview"></div>
<div class="progressBox">

<div class="progress">

<div id="progressBar"></div>

</div>

<p id="progressText">

0%

</p>

</div>
<button id="convertBtn">

Convert to PDF

</button>
<footer>

Made with ❤️ by AlphaDev Stack

</footer>
